services:
  - type: web
    name: openclaw
    runtime: docker
    region: frankfurt
    plan: standard
    dockerCommand: sh -c "mkdir -p /data/.openclaw && [ ! -f /data/.openclaw/openclaw.json ] && echo '{\"gateway\":{\"controlUi\":{\"dangerouslyAllowHostHeaderOriginFallback\":true}}}' > /data/.openclaw/openclaw.json; exec node openclaw.mjs gateway --allow-unconfigured --bind lan --port $PORT"    
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "8080"
      - key: SETUP_PASSWORD
        sync: false
      - key: OPENCLAW_STATE_DIR
        value: /data/.openclaw
      - key: OPENCLAW_WORKSPACE_DIR
        value: /data/workspace
      - key: OPENCLAW_GATEWAY_TOKEN
        generateValue: true
    disk:
      name: openclaw-data
      mountPath: /data
      sizeGB: 1
