services:
  - type: web
    name: openclaw
    runtime: docker
    region: frankfurt
    plan: standard
    dockerCommand: mkdir -p /data/.openclaw && echo eyJnYXRld2F5Ijp7ImNvbnRyb2xVaSI6eyJkYW5nZXJvdXNseUFsbG93SG9zdEhlYWRlck9yaWdpbkZhbGxiYWNrIjp0cnVlfX19 | base64 -d > /data/.openclaw/openclaw.json && node openclaw.mjs gateway --allow-unconfigured --bind lan --port $PORT    
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "8080"
      - key: SETUP_PASSWORD
        sync: false
      - key: OPENCLAW_STATE_DIR
        value: /data/.openclaw
      - key: OPENCLAW_WORKSPACE_DIR
        value: /data/workspace
      - key: OPENCLAW_GATEWAY_TOKEN
        generateValue: true
    disk:
      name: openclaw-data
      mountPath: /data
      sizeGB: 1
